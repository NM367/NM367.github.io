<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>✿ ちゃぷりのお気に入りリンク ✿</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #fef0f5 0%, #f0f0fe 50%, #fef5e4 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; overflow-x: hidden;
    }
    .container { text-align: center; max-width: 520px; width: 100%; }
    .header { margin-bottom: 2rem; }
    .title { font-size: 26px; font-weight: 700; color: #4a3f8f; letter-spacing: 0.05em; }
    .subtitle { font-size: 13px; color: #888; margin-top: 6px; }
    .card-list { display: flex; flex-direction: column; gap: 16px; }
    .card {
      background: #fff; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px; padding: 1.25rem 1.5rem;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .card-icon {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 24px;
    }
    .card--purple .card-icon { background: #EEEDFE; color: #534AB7; }
    .card--teal   .card-icon { background: #E1F5EE; color: #0F6E56; }
    .card--purple:hover { background: #f5f4ff; }
    .card--teal:hover   { background: #effaf6; }
    .card-body { text-align: left; flex: 1; }
    .card-name { font-weight: 600; font-size: 15px; color: #222; }
    .card-arrow { font-size: 18px; color: #bbb; flex-shrink: 0; }
    .footer { margin-top: 2rem; font-size: 12px; color: #aaa; }
    .reload-btn {
      margin-top: 1.5rem; display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px; padding: 10px 20px;
      font-size: 13px; font-weight: 600; color: #534AB7;
      cursor: pointer; transition: background 0.15s, transform 0.15s; font-family: inherit;
    }
    .reload-btn:hover { background: #f5f4ff; }
    .reload-btn:active { transform: scale(0.96); }
    .reload-btn i { font-size: 16px; transition: transform 0.4s; }
    .reload-btn.spinning i { transform: rotate(360deg); }
    .chara-stage {
      position: relative; width: 100%; height: 120px;
      margin-bottom: 0.5rem; overflow: hidden;
    }
    .chara {
      position: absolute; bottom: 0;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: bottom center;
      cursor: pointer;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.12));
      will-change: transform;
    }
    @keyframes stepBounce {
      0%,100% { transform: translateY(0) scaleX(var(--flip,1)); }
      25%      { transform: translateY(-6px) scaleX(var(--flip,1)); }
      75%      { transform: translateY(-3px) scaleX(var(--flip,1)); }
    }
    @keyframes jumpUp {
      0%   { transform: translateY(0) scaleX(var(--flip,1)); }
      35%  { transform: translateY(-30px) scaleX(var(--flip,1)); }
      65%  { transform: translateY(-10px) scaleX(var(--flip,1)); }
      100% { transform: translateY(0) scaleX(var(--flip,1)); }
    }
    .chara.jumping { animation: jumpUp 0.5s ease forwards !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="chara-stage" id="stage"></div>
    <div class="header">
      <div class="title">✿ ちゃぷりのお気に入りリンク ✿</div>
      <div class="subtitle">よく使うサイトへのリンク集</div>
    </div>
    <div class="card-list">
      <a href="https://NM367.github.io/cnumber/" class="card card--teal">
        <div class="card-icon"><i class="ti ti-puzzle"></i></div>
        <div class="card-body"><div class="card-name">ちゃぷり数字パズル</div></div>
        <i class="ti ti-arrow-right card-arrow"></i>
      </a>
      <a href="https://NM367.github.io/csort5/" class="card card--purple">
        <div class="card-icon"><i class="ti ti-sort-descending"></i></div>
        <div class="card-body"><div class="card-name">ちゃぷりそーと4</div></div>
        <i class="ti ti-arrow-right card-arrow"></i>
      </a>
      <a href="https://NM367.github.io/csort3/" class="card card--purple">
        <div class="card-icon"><i class="ti ti-sort-descending"></i></div>
        <div class="card-body"><div class="card-name">ちゃぷりそーと3</div></div>
        <i class="ti ti-arrow-right card-arrow"></i>
      </a>
    </div>
    <button class="reload-btn" id="reloadBtn" type="button">
      <i class="ti ti-refresh"></i>最新の状態に更新
    </button>
    <div class="footer">˗ˋˏ クリックしてリンクへ ˎˊ˗</div>
  </div>

  <script>
    document.getElementById('reloadBtn').addEventListener('click', function() {
      this.classList.add('spinning');
      var url = window.location.href.split('#')[0].split('?')[0];
      window.location.replace(url + '?t=' + Date.now());
    });

    var charaList = [
      { src: 'usagi.png', speed: 0.9,  size: 68 },
      { src: 'kuma.png',  speed: 0.6,  size: 72 },
      { src: 'neko.png',  speed: 1.2,  size: 65 },
      { src: 'inu.png',   speed: 1.0,  size: 66 },
      { src: 'lion.png',  speed: 0.75, size: 74 },
    ];

    var stage = document.getElementById('stage');
    var nodes = [];
    var stageW = stage.offsetWidth || 320;

    charaList.forEach(function(cfg, i) {
      var el = document.createElement('div');
      el.className = 'chara';
      el.style.width  = cfg.size + 'px';
      el.style.height = cfg.size + 'px';
      el.style.backgroundImage = 'url(' + cfg.src + ')';
      var initX = Math.floor((stageW / charaList.length) * i + 10);
      el.style.left = initX + 'px';
      var dir = (i % 2 === 0) ? 1 : -1;
      el.style.setProperty('--flip', dir);
      var stepDur = (0.26 + Math.random() * 0.12).toFixed(2);
      el.style.animation = 'stepBounce ' + stepDur + 's ease-in-out infinite';
      stage.appendChild(el);

      var node = { el: el, x: initX, vx: cfg.speed * dir, size: cfg.size, jumping: false, pauseUntil: 0 };
      nodes.push(node);

      el.addEventListener('click', function() {
        if (node.jumping) return;
        node.jumping = true;
        el.classList.add('jumping');
        setTimeout(function() { el.classList.remove('jumping'); node.jumping = false; }, 520);
      });
    });

    var lastTime = null;
    function animate(ts) {
      if (!lastTime) lastTime = ts;
      var dt = Math.min(ts - lastTime, 50);
      lastTime = ts;
      var sw = stage.offsetWidth;
      nodes.forEach(function(n) {
        if (n.jumping || ts < n.pauseUntil) return;
        n.x += n.vx * dt * 0.06;
        if (n.x <= 0) {
          n.x = 0; n.vx = Math.abs(n.vx);
          n.el.style.setProperty('--flip', '1');
          n.pauseUntil = ts + 150 + Math.random() * 350;
        } else if (n.x + n.size >= sw) {
          n.x = sw - n.size; n.vx = -Math.abs(n.vx);
          n.el.style.setProperty('--flip', '-1');
          n.pauseUntil = ts + 150 + Math.random() * 350;
        }
        if (Math.random() < 0.0003) {
          n.vx = -n.vx;
          n.el.style.setProperty('--flip', n.vx > 0 ? '1' : '-1');
          n.pauseUntil = ts + 100 + Math.random() * 200;
        }
        n.el.style.left = n.x + 'px';
      });
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
