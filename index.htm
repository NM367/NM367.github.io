<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>✿ ちゃぷりのお気に入りリンク ✿</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #fef0f5 0%, #f0f0fe 50%, #fef5e4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .header {
      margin-bottom: 2rem;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      color: #4a3f8f;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 24px;
    }

    .card--purple .card-icon { background: #EEEDFE; color: #534AB7; }
    .card--teal   .card-icon { background: #E1F5EE; color: #0F6E56; }

    .card--purple:hover { background: #f5f4ff; }
    .card--teal:hover   { background: #effaf6; }

    .card-body {
      text-align: left;
      flex: 1;
    }

    .card-name {
      font-weight: 600;
      font-size: 15px;
      color: #222;
    }

    .card-url {
      font-size: 12px;
      margin-top: 3px;
    }

    .card--purple .card-url { color: #534AB7; }
    .card--teal   .card-url { color: #0F6E56; }

    .card-arrow {
      font-size: 18px;
      color: #bbb;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 2rem;
      font-size: 12px;
      color: #aaa;
    }

    .reload-btn {
      margin-top: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #534AB7;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      font-family: inherit;
    }

    .reload-btn:hover {
      background: #f5f4ff;
    }

    .reload-btn:active {
      transform: scale(0.96);
    }

    .reload-btn i {
      font-size: 16px;
      transition: transform 0.4s;
    }

    .reload-btn.spinning i {
      transform: rotate(360deg);
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <div class="title">✿ ちゃぷりのお気に入りリンク ✿</div>
      <div class="subtitle">よく使うサイトへのリンク集</div>
    </div>

    <div class="card-list">

      <a href="https://NM367.github.io/cnumber/" class="card card--teal">
        <div class="card-icon">
          <i class="ti ti-puzzle" aria-hidden="true"></i>
        </div>
        <div class="card-body">
          <div class="card-name">ちゃぷり数字パズル</div>
        </div>
        <i class="ti ti-arrow-right card-arrow" aria-hidden="true"></i>
      </a>

      <a href="https://NM367.github.io/csort4/" class="card card--purple">
        <div class="card-icon">
          <i class="ti ti-sort-descending" aria-hidden="true"></i>
        </div>
        <div class="card-body">
          <div class="card-name">ちゃぷりそーと4</div>
        </div>
        <i class="ti ti-arrow-right card-arrow" aria-hidden="true"></i>
      </a>

      <a href="https://NM367.github.io/csort3/" class="card card--purple">
        <div class="card-icon">
          <i class="ti ti-sort-descending" aria-hidden="true"></i>
        </div>
        <div class="card-body">
          <div class="card-name">ちゃぷりそーと3</div>
        </div>
        <i class="ti ti-arrow-right card-arrow" aria-hidden="true"></i>
      </a>

    </div>

    <button class="reload-btn" id="reloadBtn" type="button">
      <i class="ti ti-refresh" aria-hidden="true"></i>
      最新の状態に更新
    </button>

    <div class="footer">˗ˋˏ クリックしてリンクへ ˎˊ˗</div>

  </div>

  <script>
    document.getElementById('reloadBtn').addEventListener('click', function () {
      this.classList.add('spinning');
      // キャッシュを無視して強制的に再取得する
      var url = window.location.href.split('#')[0].split('?')[0];
      window.location.replace(url + '?t=' + Date.now());
    });
  </script>

</body>
</html>
