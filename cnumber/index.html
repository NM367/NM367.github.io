<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';">
<meta name="referrer" content="no-referrer">
<title>ちゃぷり数字パズル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ===== タイトル画面 ===== -->
  <section id="screen-title" class="screen is-active">
    <div class="title-wrap">
      <div class="logo-grid" aria-hidden="true">
        <span class="lg lg-num">4</span><span class="lg lg-op">+</span><span class="lg lg-num">9</span>
        <span class="lg lg-op">−</span><span class="lg lg-q">?</span><span class="lg lg-op">÷</span>
        <span class="lg lg-num">2</span><span class="lg lg-op">×</span><span class="lg lg-num">3</span>
      </div>
      <h1 class="title-logo">ちゃぷり<br><span>数字パズル</span></h1>
      <p class="tagline">数字となかよく、ちゃぷりの脳トレ♪</p>
      <div class="title-buttons">
        <button id="btn-continue" class="btn btn-secondary is-hidden"></button>
        <button id="btn-start" class="btn btn-primary btn-lg">はじめる</button>
      </div>
    </div>
    <button class="btn-fab" id="btn-title-settings" aria-label="設定">⚙</button>
  </section>

  <!-- ===== ステージ選択画面 ===== -->
  <section id="screen-select" class="screen">
    <header class="topbar">
      <button class="btn-icon" id="btn-select-back" aria-label="タイトルへ戻る">←</button>
      <h2>ステージをえらぼう</h2>
      <button class="btn-icon" id="btn-select-settings" aria-label="設定">⚙</button>
    </header>
    <div class="select-scroll">
      <div class="stage-grid" id="stage-grid"></div>
    </div>
  </section>

  <!-- ===== ゲーム画面 ===== -->
  <section id="screen-game" class="screen">
    <header class="topbar">
      <button class="btn-icon" id="btn-game-back" aria-label="ステージ選択へ戻る">←</button>
      <h2 id="game-title">ステージ1</h2>
      <div class="topbar-actions">
        <button class="btn-icon" id="btn-game-reset" aria-label="やり直す">↺</button>
        <button class="btn-icon" id="btn-game-settings" aria-label="設定">⚙</button>
      </div>
    </header>

    <div class="status-bar">
      <div class="status-pill" id="miss-pill">ミス <strong><span id="miss-count">0</span>/3</strong></div>
      <div class="status-pill">⏱ <strong id="timer-display">00:00</strong></div>
    </div>

    <div class="grid-scroll">
      <div class="puzzle-grid" id="puzzle-grid"></div>
    </div>

    <footer class="pool-area">
      <div class="pool-controls">
        <button class="btn btn-pill" id="btn-hint">
          <span class="pill-icon">💡</span>ヒント<span id="hint-remain"></span>
        </button>
      </div>
      <div class="number-pool" id="number-pool"></div>
    </footer>
  </section>

  <!-- ===== クリアモーダル ===== -->
  <div class="modal-overlay is-hidden" id="modal-clear">
    <div class="modal-card modal-clear">
      <div class="confetti" id="confetti"></div>
      <div class="modal-emoji">🎉</div>
      <p class="praise" id="praise-text">ちゃぷりすごい！</p>
      <div class="modal-stats">
        <div class="stat-row"><span>タイム</span><strong id="clear-time">00:00</strong></div>
        <div class="stat-row"><span>ミス</span><strong id="clear-miss">0回</strong></div>
        <div class="stars" id="clear-stars"></div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btn-clear-retry">もう一度</button>
        <button class="btn btn-secondary" id="btn-clear-select">ステージ選択</button>
        <button class="btn btn-primary" id="btn-clear-next">次のステージへ</button>
      </div>
    </div>
  </div>

  <!-- ===== 失敗モーダル ===== -->
  <div class="modal-overlay is-hidden" id="modal-fail">
    <div class="modal-card">
      <div class="modal-emoji">💦</div>
      <p class="praise" id="fail-text">ちゃぷり、ドンマイ！</p>
      <p class="fail-sub">ミスが3回になっちゃった。もう一度チャレンジしてみよう！</p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btn-fail-select">ステージ選択</button>
        <button class="btn btn-primary" id="btn-fail-retry">もう一度</button>
      </div>
    </div>
  </div>

  <!-- ===== 戻る確認モーダル ===== -->
  <div class="modal-overlay is-hidden" id="modal-confirm">
    <div class="modal-card">
      <p class="confirm-text" id="confirm-text">ステージ選択に戻りますか？
このステージの記録は保存されません。</p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btn-confirm-cancel">キャンセル</button>
        <button class="btn btn-primary" id="btn-confirm-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- ===== 設定モーダル ===== -->
  <div class="modal-overlay is-hidden" id="modal-settings">
    <div class="modal-card">
      <h3 class="modal-heading">せってい</h3>
      <label class="setting-row">
        <span>サウンド</span>
        <input type="checkbox" id="setting-sound" checked>
      </label>
      <label class="setting-row">
        <span>テーマ</span>
        <select id="setting-theme">
          <option value="normal">ノーマル（ピンク）</option>
          <option value="dark">ダーク</option>
        </select>
      </label>
      <button class="btn btn-danger" id="btn-reset-data">進行データを初期化する</button>
      <button class="btn btn-primary" id="btn-settings-close">とじる</button>
    </div>
  </div>

</div>
<script src="stages.js"></script>
<script src="script.js"></script>
</body>
</html>
