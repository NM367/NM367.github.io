<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; media-src 'none'; worker-src 'none'; manifest-src 'none';">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">
<title>ちゃぷりミャウドク</title>
<style>
  :root{
    --pink:#F9C0D0; --pink-d:#F28FAA;
    --blue:#CFE3FB; --blue-d:#8FB8ED;
    --mint:#C9EEDD; --mint-d:#7FD3B0;
    --brown:#D9B98C; --brown-d:#B98F55;
    --orange:#F5B36B; --orange-d:#E8903B;
    --lavender:#CFC9E8; --lavender-d:#A79ED4;
    --skin:#F0C9A0; --skin-d:#D8A868;
    --tanuki:#C9A67E; --tanuki-d:#A87D53;
    --gold:#F2C14E; --gold-d:#DE9F1F;
    --cream:#F5E1B7; --cream-d:#E0BD7C;
    --bg1:#FFF6EC; --bg2:#FDEBF3;
    --ink:#5A4A42; --ink-soft:#8A776C;
    --panel:#FFFFFF;
    --shadow: 0 6px 0 rgba(0,0,0,0.08);
    /* マス目用: 色相をはっきり分けた見分けやすい配色 */
    --r0:#FF6FA5; --r1:#3D7DF0; --r2:#8FCB2E; --r3:#A97BF0; --r4:#FF9F40;
    --r5:#FFD83D; --r6:#F2645C; --r7:#1FB8CF; --r8:#B9814C; --r9:#98A2B3;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Maru Gothic ProN","Yu Gothic","Helvetica Neue",sans-serif;
    color:var(--ink);
    background: radial-gradient(circle at 20% 10%, var(--bg2), var(--bg1) 60%);
    overscroll-behavior:none;
    user-select:none;
  }
  #app{ min-height:100%; display:flex; flex-direction:column; align-items:center; padding:16px; }
  .screen{ width:100%; max-width:520px; display:none; flex-direction:column; align-items:center; animation: fadeIn .35s ease; }
  .screen.active{ display:flex; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  h1.title{
    font-size:28px; margin:18px 0 4px; color:var(--pink-d);
    text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff;
    letter-spacing:1px;
  }
  .subtitle{ font-size:13px; color:var(--ink-soft); margin-bottom:18px; }

  .zoo-row{ display:flex; justify-content:center; flex-wrap:wrap; gap:6px; margin:10px 0 20px; max-width:420px; }
  .zoo-row img{ width:46px; height:46px; object-fit:contain; animation: bounce 1.6s infinite ease-in-out; }
  .zoo-row img:nth-child(2n){ animation-delay:.15s; }
  .zoo-row img:nth-child(3n){ animation-delay:.3s; }
  .zoo-row img:nth-child(5n){ animation-delay:.45s; }
  @keyframes bounce{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-10px);} }

  button{ font-family:inherit; cursor:pointer; border:none; }
  .btn{
    background:var(--pink); color:#fff; font-weight:700; font-size:16px;
    padding:14px 30px; border-radius:999px; box-shadow:var(--shadow);
    transition: transform .08s ease;
  }
  .btn:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.08); }
  .btn.secondary{ background:var(--blue); }
  .btn.small{ padding:8px 18px; font-size:13px; }
  .btn:disabled{ opacity:.4; }

  .stack{ position:relative; z-index:1; display:flex; flex-direction:column; gap:12px; align-items:center; width:100%; }

  /* ステージ選択 */
  .stage-grid{
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; width:100%; max-width:460px;
    max-height:58vh; overflow-y:auto; padding:4px 4px 10px; -webkit-overflow-scrolling:touch;
  }
  .stage-cell{
    aspect-ratio:1; background:#fff; border-radius:16px; box-shadow:0 4px 0 rgba(0,0,0,.08);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    font-weight:800; font-size:13px; color:var(--ink);
  }
  .stage-cell .level-name{ font-size:13px; }
  .stage-cell .star{ font-size:10px; color:var(--gold-d); }
  .stage-cell.cleared{ background:linear-gradient(160deg,#FFF3D6,#FFE3B0); }
  .stage-preview{ display:flex; gap:2px; margin-top:2px; flex-wrap:wrap; justify-content:center; }
  .stage-preview img{ width:12px; height:12px; object-fit:contain; opacity:.85; }

  /* ゲーム画面 */
  .game-header{
    width:100%; max-width:480px; display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px; padding:0 4px;
  }
  .hearts{ font-size:20px; letter-spacing:2px; }
  .timer{ font-size:15px; font-weight:700; color:var(--ink-soft); background:#fff; padding:4px 12px; border-radius:999px; box-shadow:0 3px 0 rgba(0,0,0,.06); }
  .stage-label{ font-size:13px; font-weight:700; color:var(--ink-soft); }

  .board-wrap{
    width:100%; max-width:480px; aspect-ratio:1; background:#fff; border-radius:20px;
    box-shadow:0 8px 0 rgba(0,0,0,.08); padding:8px; margin-bottom:12px;
  }
  .board{
    width:100%; height:100%; display:grid; gap:2px; border-radius:12px; overflow:hidden;
    touch-action:none;
  }
  .cell{
    position:relative; display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .cell::after{
    content:""; position:absolute; inset:0; border:1px solid rgba(255,255,255,.55); pointer-events:none;
  }
  .cell img.animal-icon{
    width:90%; height:90%; object-fit:contain; opacity:0; transition:opacity .15s ease;
    pointer-events:none;
  }
  .icon-pop{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .cell.filled .icon-pop{ animation: pop .32s cubic-bezier(.34,1.56,.64,1) both; }
  .cell.filled img.animal-icon{
    opacity:1;
    animation: idleBob 2.6s ease-in-out .32s infinite;
  }
  @keyframes pop{ 0%{ transform:scale(.3); } 60%{ transform:scale(1.2);} 100%{ transform:scale(1);} }
  @keyframes idleBob{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-6%) rotate(-3deg); }
  }
  .cell.just-found::before{
    content:""; position:absolute; inset:0; border-radius:4px; z-index:2;
    background:radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 70%);
    animation: foundGlow .55s ease-out;
    pointer-events:none;
  }
  @keyframes foundGlow{
    0%{ opacity:0; transform:scale(.4); }
    40%{ opacity:1; transform:scale(1.15); }
    100%{ opacity:0; transform:scale(1.4); }
  }
  .cell .mark{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .1s ease; pointer-events:none;
  }
  .cell .mark.show{ opacity:1; }
  .cell .mark svg{ width:56%; height:56%; overflow:visible; }
  .cell.mistake{ animation: shake .4s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);} 80%{transform:translateX(4px);}
  }
  .cell.mistake::before{ content:""; position:absolute; inset:0; background:rgba(230,80,80,.35); }
  .cell.hint-highlight{ box-shadow: inset 0 0 0 3px #fff, inset 0 0 0 6px var(--pink-d); animation: pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.15);} }

  .region-0{background:var(--r0);} .region-1{background:var(--r1);}
  .region-2{background:var(--r2);} .region-3{background:var(--r3);}
  .region-4{background:var(--r4);} .region-5{background:var(--r5);}
  .region-6{background:var(--r6);} .region-7{background:var(--r7);}
  .region-8{background:var(--r8);} .region-9{background:var(--r9);}

  .controls{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
  .ctrl-btn{
    background:#fff; padding:10px 14px; border-radius:14px; font-size:13px; font-weight:700;
    box-shadow:0 3px 0 rgba(0,0,0,.07); color:var(--ink); display:flex; align-items:center; gap:5px;
  }
  .ctrl-btn:active{ transform:translateY(2px); box-shadow:none; }

  .hint-bubble{
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:14px; font-size:13px;
    max-width:88%; text-align:center; opacity:0; transition:opacity .25s ease; pointer-events:none; z-index:50;
  }
  .hint-bubble.show{ opacity:.94; }

  /* 失敗オーバーレイ */
  .overlay{
    position:fixed; inset:0; background:rgba(90,74,66,.45); display:none;
    align-items:center; justify-content:center; z-index:60;
  }
  .overlay.show{ display:flex; }
  .overlay-card{
    background:#fff; border-radius:22px; padding:28px 26px; text-align:center; max-width:320px;
    box-shadow:0 10px 0 rgba(0,0,0,.1);
  }
  .overlay-card h2{ margin:0 0 8px; color:var(--pink-d); }
  .overlay-card p{ margin:0 0 18px; font-size:14px; color:var(--ink-soft); }

  /* クリア画面 */
  .clear-burst{
    position:absolute; top:8px; left:50%; width:340px; height:340px; transform:translateX(-50%);
    background: conic-gradient(from 0deg,
      rgba(255,214,140,.55) 0deg, rgba(255,214,140,0) 18deg,
      rgba(255,180,210,.55) 40deg, rgba(255,180,210,0) 58deg,
      rgba(180,220,255,.5) 80deg, rgba(180,220,255,0) 98deg,
      rgba(255,214,140,.55) 120deg, rgba(255,214,140,0) 138deg,
      rgba(255,180,210,.5) 160deg, rgba(255,180,210,0) 178deg,
      rgba(180,220,255,.55) 200deg, rgba(180,220,255,0) 218deg,
      rgba(255,214,140,.5) 240deg, rgba(255,214,140,0) 258deg,
      rgba(255,180,210,.55) 280deg, rgba(255,180,210,0) 298deg,
      rgba(180,220,255,.5) 320deg, rgba(180,220,255,0) 338deg,
      rgba(255,214,140,.55) 360deg);
    border-radius:50%;
    animation: burstSpin 9s linear infinite;
    pointer-events:none; z-index:0;
  }
  @keyframes burstSpin{ from{ transform:translateX(-50%) rotate(0deg);} to{ transform:translateX(-50%) rotate(360deg);} }

  .confetti-layer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:70; }
  .confetti-piece{
    position:absolute; top:-24px; border-radius:2px; opacity:0.95;
    animation-name: confettiFall; animation-timing-function: cubic-bezier(.35,0,.65,1); animation-fill-mode: forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(-24px) rotate(0deg); opacity:1; }
    85%{ opacity:1; }
    100%{ transform:translateY(112vh) rotate(640deg); opacity:0.85; }
  }

  #screen-clear{ position:relative; z-index:1; padding-top:6px; }
  .clear-animals{
    position:relative; z-index:1; display:flex; justify-content:center; flex-wrap:wrap; gap:8px;
    margin:14px 0 8px;
  }
  .clear-animals img{
    width:58px; height:58px; object-fit:contain;
    animation: clearPop .6s cubic-bezier(.34,1.56,.64,1) both, wiggle 1.4s ease-in-out .6s infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.12));
  }
  @keyframes clearPop{
    0%{ transform:scale(0) rotate(-30deg); opacity:0; }
    60%{ transform:scale(1.25) rotate(8deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }
  @keyframes wiggle{
    0%,100%{ transform:rotate(0deg) translateY(0); }
    25%{ transform:rotate(-6deg) translateY(-3px); }
    75%{ transform:rotate(6deg) translateY(-3px); }
  }
  .praise{
    position:relative; z-index:1;
    font-size:32px; font-weight:900; color:var(--pink-d); margin:8px 0 4px; text-align:center;
    text-shadow:3px 3px 0 #fff, -1px -1px 0 #fff;
    animation: praisePop .55s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes praisePop{
    0%{ transform:scale(.2) rotate(-10deg); opacity:0; }
    55%{ transform:scale(1.18) rotate(4deg); opacity:1; }
    80%{ transform:scale(.94) rotate(-2deg); }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }
  .clear-stats{
    position:relative; z-index:1; font-size:14px; color:var(--ink-soft); margin-bottom:18px;
    animation: fadeIn .5s ease .3s both;
  }
  .clear-sparkle{
    position:absolute; z-index:1; font-size:22px; pointer-events:none;
    animation: sparklePop 1.1s ease-out both;
  }
  @keyframes sparklePop{
    0%{ transform:scale(0) rotate(0deg); opacity:0; }
    40%{ transform:scale(1.3) rotate(20deg); opacity:1; }
    100%{ transform:scale(.8) rotate(40deg); opacity:0; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- タイトル画面 -->
  <section id="screen-title" class="screen active">
    <h1 class="title">ちゃぷりミャウドク</h1>
    <div class="subtitle">いろいろな どうぶつを さがしだそう</div>
    <div class="zoo-row" id="titleZoo"></div>
    <div class="stack">
      <button class="btn" id="btnStart">はじめる</button>
      <button class="btn secondary" id="btnContinue" style="display:none;">つづきから</button>
    </div>
  </section>

  <!-- ステージ選択画面 -->
  <section id="screen-select" class="screen">
    <h1 class="title" style="font-size:22px;">ステージ せんたく</h1>
    <div class="stage-grid" id="stageGrid"></div>
    <div style="height:16px;"></div>
    <button class="btn small secondary" id="btnBackToTitle">タイトルへ もどる</button>
  </section>

  <!-- ゲーム画面 -->
  <section id="screen-game" class="screen">
    <div class="game-header">
      <div class="stage-label" id="stageLabel">ステージ 1</div>
      <div class="hearts" id="heartsView">❤️❤️❤️</div>
      <div class="timer" id="timerView">00:00</div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="btnUndo">↩ もどす</button>
      <button class="ctrl-btn" id="btnClearMarks">✖ ×を消す</button>
      <button class="ctrl-btn" id="btnHint">💡 ヒント</button>
      <button class="ctrl-btn" id="btnRestart">🔄 さいしょから</button>
    </div>
    <button class="btn small secondary" id="btnBackToSelect">ステージ選択へ</button>
  </section>

  <!-- クリア画面 -->
  <section id="screen-clear" class="screen">
    <div class="clear-burst"></div>
    <div class="clear-animals" id="clearZoo"></div>
    <div class="praise" id="praiseText">ちゃぷりすごい！</div>
    <div class="clear-stats" id="clearStats">タイム 00:00 ／ ミス 0かい</div>
    <div class="stack">
      <button class="btn" id="btnNextStage">つぎのステージへ</button>
      <button class="btn secondary" id="btnClearToSelect">ステージ選択へ</button>
    </div>
  </section>

</div>

<div class="hint-bubble" id="hintBubble"></div>
<div class="confetti-layer" id="confettiLayer"></div>

<div class="overlay" id="failOverlay">
  <div class="overlay-card">
    <h2>むむむ…</h2>
    <p>ハートがなくなっちゃった。<br>もういちど ちょうせんしてみよう！</p>
    <button class="btn" id="btnRetryFromFail">さいしょから やりなおす</button>
  </div>
</div>

<script src="stages.js"></script>
<script>
(function(){
  "use strict";

  var ANIMALS = ['usagi','neko','inu','kuma','kitsune','zou','saru','tanuki','lion','lioness'];
  var ANIMAL_SET = Object.create(null);
  ANIMALS.forEach(function(a){ ANIMAL_SET[a] = true; });
  // stages.js のデータが万一壊れていても、想定外の文字列から画像パスを組み立てないようにする防御的チェック
  function safeAnimalSrc(name){
    var safeName = (typeof name === 'string' && ANIMAL_SET[name]) ? name : 'usagi';
    return 'assets/' + safeName + '.png';
  }
  var ANIMAL_LABEL = {
    usagi:'うさぎ', neko:'ねこ', inu:'いぬ', kuma:'くま', kitsune:'きつね',
    zou:'ぞう', saru:'さる', tanuki:'たぬき', lion:'ライオン', lioness:'めすライオン'
  };
  var LEVEL_LABEL = { easy:'レベル1', normal:'レベル2', hard:'レベル3' };

  // 同じレベル内に複数ステージがある場合は「レベル3-12」のように連番を付けて区別する
  function stageDisplayLabel(stage){
    var base = LEVEL_LABEL[stage.level] || 'ステージ';
    var sameLevel = STAGES.filter(function(s){ return s.level === stage.level; });
    if(sameLevel.length <= 1) return base;
    var idx = sameLevel.findIndex(function(s){ return s.id === stage.id; });
    return base + '-' + (idx+1);
  }
  var DOUBLE_TAP_MS = 280;
  var SAVE_KEY = 'chapuri_meowdoku_save_v1';

  var STAGES = (window.CHAPURI_MEOWDOKU_STAGES || []).map(function(s){
    // レギオンIDごとに動物名を引けるようにしておく
    return s;
  });

  /* ---------------- localStorage セーブ管理（安全性チェック付き） ---------------- */
  function defaultSave(){ return { clearedStageIds:[], bestTimes:{}, lastStageId:null }; }

  function loadSave(){
    try{
      var raw = window.localStorage.getItem(SAVE_KEY);
      if(!raw) return defaultSave();
      var data = JSON.parse(raw);
      if(!data || typeof data !== 'object') return defaultSave();
      var out = defaultSave();
      if(Array.isArray(data.clearedStageIds)){
        out.clearedStageIds = data.clearedStageIds.filter(function(v){ return typeof v === 'number' && isFinite(v); });
      }
      if(data.bestTimes && typeof data.bestTimes === 'object' && !Array.isArray(data.bestTimes)){
        Object.keys(data.bestTimes).forEach(function(k){
          var v = data.bestTimes[k];
          if(typeof v === 'number' && isFinite(v) && v >= 0){ out.bestTimes[k] = v; }
        });
      }
      if(typeof data.lastStageId === 'number' && isFinite(data.lastStageId)){
        out.lastStageId = data.lastStageId;
      }
      return out;
    }catch(e){
      return defaultSave();
    }
  }

  function writeSave(data){
    try{
      var safe = {
        clearedStageIds: Array.isArray(data.clearedStageIds) ? data.clearedStageIds.filter(function(v){return typeof v==='number';}) : [],
        bestTimes: {},
        lastStageId: (typeof data.lastStageId === 'number') ? data.lastStageId : null
      };
      if(data.bestTimes && typeof data.bestTimes === 'object'){
        Object.keys(data.bestTimes).forEach(function(k){
          var v = data.bestTimes[k];
          if(typeof v === 'number' && isFinite(v) && v>=0){ safe.bestTimes[k] = v; }
        });
      }
      window.localStorage.setItem(SAVE_KEY, JSON.stringify(safe));
    }catch(e){ /* 保存に失敗しても致命的ではないので握りつぶす */ }
  }

  var save = loadSave();

  /* ---------------- サウンド (Web Audio API) ---------------- */
  var audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume(); }
  }
  function beep(freq, dur, type, gainVal, delay){
    if(!audioCtx) return;
    var t0 = audioCtx.currentTime + (delay||0);
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(gainVal||0.15, t0+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }
  function sndTap(){ beep(520,0.06,'sine',0.08); }
  function sndMark(){ beep(380,0.07,'triangle',0.10); }
  function sndFound(){
    // 動物を見つけた瞬間の「やったね」感のあるキラキラした上昇フレーズ
    [880,1108,1318,1568].forEach(function(f,i){ beep(f,0.16,'triangle',0.15, i*0.055); });
  }
  function sndMistake(){
    // まちがえたと分かりやすい、2回続けての低いブザー音
    beep(220,0.14,'square',0.16,0);
    beep(165,0.20,'square',0.16,0.13);
  }
  function sndClear(){
    [523,659,784,1046].forEach(function(f,i){ beep(f,0.22,'sine',0.14, i*0.09); });
  }
  function sndFanfare(){
    // クリア画面が表示される瞬間に鳴らす、少し長めで豪華な祝福フレーズ
    var melody = [784,880,988,1175,1319];
    melody.forEach(function(f,i){ beep(f,0.26,'triangle',0.13, i*0.085); });
    [523,659,784].forEach(function(f){ beep(f,0.6,'sine',0.08,0.42); });
  }

  /* ---------------- 画面遷移 ---------------- */
  var screens = {
    title: document.getElementById('screen-title'),
    select: document.getElementById('screen-select'),
    game: document.getElementById('screen-game'),
    clear: document.getElementById('screen-clear')
  };
  function showScreen(name){
    Object.keys(screens).forEach(function(k){ screens[k].classList.toggle('active', k===name); });
    if(name !== 'game'){
      // ゲーム画面から離れるときは、保留中のタップ判定やドラッグ状態を破棄しておく
      // （放置すると、あとで別ステージに対して誤発火する原因になるため）
      cancelPendingTap();
      dragState = null;
      // 未クリアのままゲーム画面を離れた場合、タイマーのsetIntervalが動き続けてしまうため止める
      if(G && G.timerHandle){ clearInterval(G.timerHandle); G.timerHandle = null; }
      // クリア演出待ちの間に手動で移動した場合は、あとから勝手にクリア画面へ飛ばさないようにする
      if(G){ G.celebrationPending = false; }
    }
  }

  /* タイトル画面の動物たち */
  (function initTitleZoo(){
    var zoo = document.getElementById('titleZoo');
    ANIMALS.forEach(function(a){
      var img = document.createElement('img');
      img.src = safeAnimalSrc(a); img.alt = ANIMAL_LABEL[a];
      zoo.appendChild(img);
    });
  })();

  if(save.lastStageId !== null){
    document.getElementById('btnContinue').style.display = 'inline-block';
  }

  document.getElementById('btnStart').addEventListener('click', function(){
    ensureAudio();
    renderStageGrid();
    showScreen('select');
  });
  document.getElementById('btnContinue').addEventListener('click', function(){
    ensureAudio();
    var stage = STAGES.find(function(s){ return s.id === save.lastStageId; });
    if(stage){ loadStage(stage); showScreen('game'); }
    else { renderStageGrid(); showScreen('select'); }
  });
  document.getElementById('btnBackToTitle').addEventListener('click', function(){ showScreen('title'); });
  document.getElementById('btnBackToSelect').addEventListener('click', function(){
    renderStageGrid();
    showScreen('select');
  });
  document.getElementById('btnClearToSelect').addEventListener('click', function(){
    renderStageGrid();
    showScreen('select');
  });

  /* ---------------- ステージ選択（レベル1〜3を1画面で表示） ---------------- */
  function renderStageGrid(){
    var grid = document.getElementById('stageGrid');
    grid.innerHTML = '';
    STAGES.forEach(function(stage, idx){
      var cell = document.createElement('button');
      cell.className = 'stage-cell' + (save.clearedStageIds.indexOf(stage.id) >= 0 ? ' cleared' : '');
      var num = document.createElement('div');
      num.className = 'level-name';
      num.textContent = stageDisplayLabel(stage);
      cell.appendChild(num);
      var star = document.createElement('div');
      star.className = 'star';
      star.textContent = save.clearedStageIds.indexOf(stage.id) >= 0 ? '★ クリア' : (stage.size+'x'+stage.size);
      cell.appendChild(star);
      var preview = document.createElement('div');
      preview.className = 'stage-preview';
      stage.regionAnimals.slice(0,4).forEach(function(a){
        var img = document.createElement('img');
        img.src = safeAnimalSrc(a); img.alt='';
        preview.appendChild(img);
      });
      cell.appendChild(preview);
      cell.addEventListener('click', function(){
        ensureAudio();
        loadStage(stage);
        showScreen('game');
      });
      grid.appendChild(cell);
    });
  }

  /* ---------------- ゲーム状態 ---------------- */
  var G = null; // 現在プレイ中のステージ状態

  function cloneCellState(cs){
    return cs.map(function(row){ return row.slice(); });
  }

  function loadStage(stage){
    cancelPendingTap();
    dragState = null;
    if(G && G.timerHandle){ clearInterval(G.timerHandle); G.timerHandle = null; } // 直前ステージのタイマーが残らないようにする
    G = {
      stage: stage,
      size: stage.size,
      regionMap: stage.regionMap,
      regionAnimals: stage.regionAnimals,
      cellState: Array.from({length:stage.size}, function(){ return new Array(stage.size).fill('empty'); }),
      hearts: 3,
      history: [],
      startTime: Date.now(),
      elapsedBeforePause: 0,
      timerHandle: null,
      finished: false,
      celebrationPending: false
    };
    save.lastStageId = stage.id;
    writeSave(save);

    document.getElementById('stageLabel').textContent = stageDisplayLabel(stage);
    renderHearts();
    renderBoard();
    startTimer();
    document.getElementById('failOverlay').classList.remove('show');
  }

  function renderHearts(){
    var full = '❤️'.repeat(Math.max(G.hearts,0));
    var empty = '🤍'.repeat(Math.max(3-G.hearts,0));
    document.getElementById('heartsView').textContent = full + empty;
  }

  function startTimer(){
    if(G.timerHandle) clearInterval(G.timerHandle);
    G.startTime = Date.now();
    updateTimerView();
    G.timerHandle = setInterval(updateTimerView, 500);
  }
  function stopTimer(){
    if(G.timerHandle){ clearInterval(G.timerHandle); G.timerHandle = null; }
  }
  function elapsedSeconds(){
    return Math.floor((Date.now() - G.startTime)/1000);
  }
  function formatTime(sec){
    var m = Math.floor(sec/60), s = sec%60;
    return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  }
  function updateTimerView(){
    document.getElementById('timerView').textContent = formatTime(elapsedSeconds());
  }

  /* ---------------- 盤面描画 ---------------- */
  function renderBoard(){
    var board = document.getElementById('board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = 'repeat('+G.size+', 1fr)';
    board.style.gridTemplateRows = 'repeat('+G.size+', 1fr)';

    for(var r=0; r<G.size; r++){
      for(var c=0; c<G.size; c++){
        var region = G.regionMap[r][c];
        var animal = G.regionAnimals[region];
        var cell = document.createElement('div');
        cell.className = 'cell region-'+region;
        cell.dataset.row = r; cell.dataset.col = c;

        var iconPop = document.createElement('div');
        iconPop.className = 'icon-pop';

        var img = document.createElement('img');
        img.className = 'animal-icon';
        img.src = safeAnimalSrc(animal);
        img.alt = ANIMAL_LABEL[animal];
        img.draggable = false;
        iconPop.appendChild(img);
        cell.appendChild(iconPop);

        var mark = document.createElement('div');
        mark.className = 'mark';
        mark.innerHTML = '<svg viewBox="0 0 100 100">'
          + '<path d="M22,22 L78,78 M78,22 L22,78" stroke="#ffffff" stroke-width="26" stroke-linecap="round"/>'
          + '<path d="M22,22 L78,78 M78,22 L22,78" stroke="#5A4A42" stroke-width="15" stroke-linecap="round"/>'
          + '</svg>';
        cell.appendChild(mark);

        board.appendChild(cell);
      }
    }
    refreshCellVisuals();
  }

  function getCellEl(r,c){
    return document.querySelector('.cell[data-row="'+r+'"][data-col="'+c+'"]');
  }

  function refreshCellVisuals(){
    for(var r=0; r<G.size; r++){
      for(var c=0; c<G.size; c++){
        var el = getCellEl(r,c);
        if(!el) continue;
        var state = G.cellState[r][c];
        el.classList.toggle('filled', state === 'filled');
        if(state !== 'filled'){ el.classList.remove('just-found'); }
        var markEl = el.querySelector('.mark');
        markEl.classList.toggle('show', state === 'marked');
      }
    }
  }

  /* ---------------- 履歴（元に戻す） ---------------- */
  function pushHistory(){
    G.history.push({ cellState: cloneCellState(G.cellState), hearts: G.hearts });
    if(G.history.length > 200) G.history.shift();
  }
  function undo(){
    if(G.history.length === 0) return;
    var prev = G.history.pop();
    G.cellState = prev.cellState;
    G.hearts = prev.hearts;
    renderHearts();
    refreshCellVisuals();
  }

  /* ---------------- ルール判定 ---------------- */
  function isValidPlacement(r,c){
    var region = G.regionMap[r][c];
    for(var i=0;i<G.size;i++){
      for(var j=0;j<G.size;j++){
        if(i===r && j===c) continue;
        if(G.cellState[i][j] !== 'filled') continue;
        if(i===r) return false;
        if(j===c) return false;
        if(G.regionMap[i][j] === region) return false;
        if(Math.abs(i-r)<=1 && Math.abs(j-c)<=1) return false;
      }
    }
    return true;
  }

  function countFilled(){
    var n=0;
    for(var r=0;r<G.size;r++) for(var c=0;c<G.size;c++) if(G.cellState[r][c]==='filled') n++;
    return n;
  }

  /* ---------------- 操作ハンドラ ---------------- */
  function handleSingleTap(r,c){
    var state = G.cellState[r][c];
    if(state === 'filled') return; // 確定マスはシングルタップ無反応
    pushHistory();
    G.cellState[r][c] = (state === 'marked') ? 'empty' : 'marked';
    sndMark();
    refreshCellVisuals();
  }

  function handleDoubleTap(r,c){
    var state = G.cellState[r][c];
    if(state === 'filled'){
      pushHistory();
      G.cellState[r][c] = 'empty';
      sndTap();
      refreshCellVisuals();
      return;
    }
    if(isValidPlacement(r,c)){
      pushHistory();
      G.cellState[r][c] = 'filled';
      sndFound();
      refreshCellVisuals();
      var foundEl = getCellEl(r,c);
      if(foundEl){
        foundEl.classList.add('just-found');
        setTimeout(function(){ foundEl.classList.remove('just-found'); }, 600);
      }
      checkClear();
    } else {
      // ミス
      pushHistory();
      G.hearts = Math.max(0, G.hearts-1);
      renderHearts();
      sndMistake();
      var el = getCellEl(r,c);
      el.classList.add('mistake');
      setTimeout(function(){ el.classList.remove('mistake'); }, 420);
      if(G.hearts <= 0){
        G.finished = true;
        stopTimer();
        setTimeout(function(){ document.getElementById('failOverlay').classList.add('show'); }, 420);
      }
    }
  }

  function checkClear(){
    if(countFilled() === G.size){
      G.finished = true;
      stopTimer();
      var elapsed = elapsedSeconds();
      var mistakesMade = (3 - G.hearts);
      if(save.clearedStageIds.indexOf(G.stage.id) < 0){ save.clearedStageIds.push(G.stage.id); }
      var prevBest = save.bestTimes[G.stage.id];
      if(typeof prevBest !== 'number' || elapsed < prevBest){ save.bestTimes[G.stage.id] = elapsed; }
      writeSave(save);
      sndClear();
      // 完成した盤面をひと呼吸見せてから、お祝い画面へ切り替える
      var finishedStageRef = G;
      finishedStageRef.celebrationPending = true;
      setTimeout(function(){
        // その間にリスタート／別ステージへ移動、または手動でステージ選択等へ戻っていたら何もしない
        if(G !== finishedStageRef || !finishedStageRef.celebrationPending) return;
        showClearScreen(elapsed, mistakesMade);
      }, 1100);
    }
  }

  /* ---------------- ボードのタッチ/マウス処理 ---------------- */
  var pendingTap = null;   // {r,c,time,timer}
  var dragState = null;    // {active, pointerId, startX, startY, touched, historyPushed, _downCell}

  function cancelPendingTap(){
    if(pendingTap){ clearTimeout(pendingTap.timer); pendingTap = null; }
  }

  function attachBoardEvents(){
    var board = document.getElementById('board');
    board.addEventListener('pointerdown', onPointerDown);
    board.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerCancel);
  }
  attachBoardEvents(); // 盤面要素自体はステージ切替時も再利用されるため、登録は一度だけ行う

  function cellFromEvent(ev){
    var el = document.elementFromPoint(ev.clientX, ev.clientY);
    if(!el) return null;
    var cellEl = el.closest('.cell');
    if(!cellEl) return null;
    return { r: parseInt(cellEl.dataset.row,10), c: parseInt(cellEl.dataset.col,10) };
  }

  function onPointerDown(ev){
    if(!G || G.finished) return;
    if(dragState) return; // 既に別の指(ポインタ)で操作中は無視する（マルチタッチ対策）
    if(ev.button !== undefined && ev.button > 0) return; // 右クリック等は無視
    var cell = cellFromEvent(ev);
    if(!cell) return;
    dragState = { pointerId: ev.pointerId, startX: ev.clientX, startY: ev.clientY, active:false, touched:{}, historyPushed:false };
    dragState._downCell = cell;
  }

  function onPointerMove(ev){
    if(!dragState || !G || G.finished) return;
    if(ev.pointerId !== dragState.pointerId) return; // 別の指の動きは無視
    var dx = ev.clientX - dragState.startX;
    var dy = ev.clientY - dragState.startY;
    if(!dragState.active && Math.sqrt(dx*dx+dy*dy) > 8){
      dragState.active = true;
    }
    if(dragState.active){
      var cell = cellFromEvent(ev);
      if(!cell) return;
      var key = cell.r+'_'+cell.c;
      if(dragState.touched[key]) return;
      dragState.touched[key] = true;
      if(G.cellState[cell.r][cell.c] === 'empty'){
        if(!dragState.historyPushed){ pushHistory(); dragState.historyPushed = true; }
        G.cellState[cell.r][cell.c] = 'marked';
        refreshCellVisuals();
        sndMark();
      }
    }
  }

  function onPointerCancel(ev){
    if(dragState && ev.pointerId === dragState.pointerId){ dragState = null; }
  }

  function onPointerUp(ev){
    if(!dragState || ev.pointerId !== dragState.pointerId){ return; }
    var wasDrag = dragState.active;
    var downCell = dragState._downCell;
    dragState = null;
    if(!G || G.finished) return;
    if(wasDrag) return; // スワイプ操作は既に反映済み

    var cell = downCell;
    if(!cell) return;
    var now = Date.now();
    if(pendingTap && pendingTap.r === cell.r && pendingTap.c === cell.c && (now - pendingTap.time) < DOUBLE_TAP_MS){
      // 同じマスへの2回目のタップ = ダブルタップ確定
      clearTimeout(pendingTap.timer);
      pendingTap = null;
      handleDoubleTap(cell.r, cell.c);
    } else {
      // 別マスへのタップ、またはタイムアウト後のタップ。
      // 前回分の判定待ちが残っていた場合は、消してしまわずにシングルタップとして確定させる
      // （これをしないと、素早く別マスを連続タップした際に最初のタップの×印操作が消えてしまう）
      if(pendingTap){
        clearTimeout(pendingTap.timer);
        var flushed = pendingTap;
        pendingTap = null;
        handleSingleTap(flushed.r, flushed.c);
      }
      var r = cell.r, c = cell.c;
      pendingTap = {
        r:r, c:c, time: now,
        timer: setTimeout(function(){
          handleSingleTap(r,c);
          pendingTap = null;
        }, DOUBLE_TAP_MS)
      };
    }
  }

  /* ---------------- ボタン操作 ---------------- */
  document.getElementById('btnUndo').addEventListener('click', function(){ if(G && !G.finished) undo(); });
  document.getElementById('btnClearMarks').addEventListener('click', function(){
    if(!G || G.finished) return;
    pushHistory();
    for(var r=0;r<G.size;r++) for(var c=0;c<G.size;c++) if(G.cellState[r][c]==='marked') G.cellState[r][c]='empty';
    refreshCellVisuals();
  });
  document.getElementById('btnRestart').addEventListener('click', function(){
    if(!G) return;
    loadStage(G.stage);
  });
  document.getElementById('btnRetryFromFail').addEventListener('click', function(){
    document.getElementById('failOverlay').classList.remove('show');
    loadStage(G.stage);
  });

  /* ---------------- ヒント機能 ---------------- */
  document.getElementById('btnHint').addEventListener('click', function(){
    if(!G || G.finished) return;
    var hint = computeHint();
    if(!hint) return;
    var el = getCellEl(hint.r, hint.c);
    el.classList.add('hint-highlight');
    setTimeout(function(){ el.classList.remove('hint-highlight'); }, 2200);
    showHintBubble(hint.reason);
  });

  function showHintBubble(text){
    var bubble = document.getElementById('hintBubble');
    bubble.textContent = text;
    bubble.classList.add('show');
    clearTimeout(showHintBubble._t);
    showHintBubble._t = setTimeout(function(){ bubble.classList.remove('show'); }, 2400);
  }

  function computeCandidates(){
    var size = G.size;
    var candidate = Array.from({length:size}, function(){ return new Array(size).fill(true); });
    for(var r=0;r<size;r++){
      for(var c=0;c<size;c++){
        if(G.cellState[r][c] !== 'empty'){ candidate[r][c] = false; continue; }
        if(!isValidPlacement(r,c)) candidate[r][c] = false;
      }
    }
    return candidate;
  }

  function computeHint(){
    var size = G.size;
    var candidate = computeCandidates();

    // 行チェック：まだ確定していない行で、候補が1マスしかない
    for(var r=0;r<size;r++){
      var rowHasFilled = G.cellState[r].indexOf('filled') >= 0;
      if(rowHasFilled) continue;
      var cands = [];
      for(var c=0;c<size;c++) if(candidate[r][c]) cands.push(c);
      if(cands.length === 1){
        return { r:r, c:cands[0], reason: (r+1)+'行目は、この場所にしか置けません！' };
      }
    }
    // 列チェック
    for(var c=0;c<size;c++){
      var colHasFilled = false;
      for(var r2=0;r2<size;r2++) if(G.cellState[r2][c]==='filled') colHasFilled = true;
      if(colHasFilled) continue;
      var candsC = [];
      for(var r3=0;r3<size;r3++) if(candidate[r3][c]) candsC.push(r3);
      if(candsC.length === 1){
        return { r:candsC[0], c:c, reason: (c+1)+'列目は、この場所にしか置けません！' };
      }
    }
    // エリアチェック
    for(var region=0; region<size; region++){
      var animalName = ANIMAL_LABEL[G.regionAnimals[region]];
      var regionHasFilled = false;
      var candsR = [];
      for(var r4=0;r4<size;r4++){
        for(var c4=0;c4<size;c4++){
          if(G.regionMap[r4][c4] !== region) continue;
          if(G.cellState[r4][c4] === 'filled') regionHasFilled = true;
          if(candidate[r4][c4]) candsR.push([r4,c4]);
        }
      }
      if(regionHasFilled) continue;
      if(candsR.length === 1){
        return { r:candsR[0][0], c:candsR[0][1], reason: animalName+'のエリアは、この場所にしか置けません！' };
      }
    }
    // 論理的に確定できるマスがなければ、正解のマスをそのまま1つ教える
    for(var i=0;i<G.stage.solution.length;i++){
      var sr = G.stage.solution[i][0], sc = G.stage.solution[i][1];
      if(G.cellState[sr][sc] !== 'filled'){
        return { r:sr, c:sc, reason: 'ここに置いてみよう！' };
      }
    }
    return null;
  }

  /* ---------------- クリア画面演出 ---------------- */
  var CONFETTI_COLORS = ['#F28FAA','#8FB8ED','#7FD3B0','#E8903B','#F2C14E','#A79ED4','#F0C9A0'];

  function spawnConfetti(){
    var layer = document.getElementById('confettiLayer');
    layer.innerHTML = '';
    var count = 46;
    for(var i=0; i<count; i++){
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      var size = 6 + Math.random()*7;
      var isCircle = Math.random() < 0.35;
      piece.style.width = size + 'px';
      piece.style.height = (isCircle ? size : size*1.6) + 'px';
      piece.style.borderRadius = isCircle ? '50%' : '2px';
      piece.style.left = (Math.random()*100) + 'vw';
      piece.style.background = CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
      piece.style.animationDuration = (2.2 + Math.random()*1.4) + 's';
      piece.style.animationDelay = (Math.random()*0.5) + 's';
      layer.appendChild(piece);
    }
    // 一定時間後にDOMから片付ける（次のクリア時にspawnConfettiがまた作り直す）
    clearTimeout(spawnConfetti._cleanupTimer);
    spawnConfetti._cleanupTimer = setTimeout(function(){ layer.innerHTML = ''; }, 4200);
  }

  function spawnSparkles(container){
    var old = container.querySelectorAll('.clear-sparkle');
    old.forEach(function(el){ el.remove(); });
    var marks = ['✨','⭐','🎉'];
    for(var i=0; i<7; i++){
      var s = document.createElement('div');
      s.className = 'clear-sparkle';
      s.textContent = marks[Math.floor(Math.random()*marks.length)];
      s.style.left = (10 + Math.random()*80) + '%';
      s.style.top = (Math.random()*60) + '%';
      s.style.animationDelay = (Math.random()*0.5) + 's';
      container.appendChild(s);
    }
  }

  /* ---------------- クリア画面 ---------------- */
  var PRAISE_NORMAL = [
    'ちゃぷりすごい！', 'ちゃぷりさいこう！', 'ちゃぷり天才！',
    'さすがちゃぷり！', 'ちゃぷりナイス推理！', 'ちゃぷりかっこいい！', 'やったね、ちゃぷり！'
  ];
  var PRAISE_PERFECT = [
    'ちゃぷり完璧！', 'ノーミスすごい、ちゃぷり！', 'かんぺきクリア、ちゃぷり！'
  ];

  function showClearScreen(elapsed, mistakesMade){
    var zoo = document.getElementById('clearZoo');
    zoo.innerHTML = '';
    G.regionAnimals.forEach(function(a, idx){
      var img = document.createElement('img');
      img.src = safeAnimalSrc(a); img.alt = ANIMAL_LABEL[a];
      img.style.animationDelay = (idx*0.06)+'s, ' + (0.6+idx*0.06) + 's';
      zoo.appendChild(img);
    });
    var praiseList = (mistakesMade === 0) ? PRAISE_PERFECT : PRAISE_NORMAL;
    var praise = praiseList[Math.floor(Math.random()*praiseList.length)];
    var praiseEl = document.getElementById('praiseText');
    praiseEl.textContent = praise;
    document.getElementById('clearStats').textContent =
      'タイム ' + formatTime(elapsed) + ' ／ ミス ' + mistakesMade + 'かい';
    showScreen('clear');
    spawnConfetti();
    spawnSparkles(document.getElementById('screen-clear'));
    sndFanfare();
  }

  document.getElementById('btnNextStage').addEventListener('click', function(){
    var idx = STAGES.findIndex(function(s){ return s.id === G.stage.id; });
    var next = STAGES[idx+1];
    if(next){
      loadStage(next);
      showScreen('game');
    } else {
      renderStageGrid();
      showScreen('select');
    }
  });

})();
</script>
