<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="no-referrer">
<title>ちゃぷりそーと3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" crossorigin="anonymous">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0c29;--accent:#ff6bdf;--accent2:#7b61ff;--gold:#ffd700;
  --text:#f0f4ff;--text2:#a0a8cc;
  --tube-glass:rgba(180,210,255,0.13);--tube-border:rgba(200,230,255,0.48);
  --tube-shine:rgba(255,255,255,0.28);--btn-bg:rgba(255,255,255,0.07);
  --btn-border:rgba(255,255,255,0.15);
}
html,body{width:100%;height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none;-webkit-user-select:none;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .25s,transform .25s;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.97);}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:orbFloat 8s ease-in-out infinite alternate;}
.orb1{width:280px;height:280px;background:#7b61ff;top:-60px;left:-60px;}
.orb2{width:240px;height:240px;background:#ff6bdf;bottom:-50px;right:-50px;animation-delay:3s;}
.orb3{width:180px;height:180px;background:#00d4ff;top:45%;left:55%;animation-delay:1.5s;}
@keyframes orbFloat{from{transform:translate(0,0) scale(1);}to{transform:translate(25px,18px) scale(1.08);}}

/* TITLE */
#titleScreen{z-index:10;gap:26px;}
.main-title{font-size:clamp(24px,8vw,44px);font-weight:900;background:linear-gradient(135deg,#ff6bdf,#7b61ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(123,97,255,.5));line-height:1.1;letter-spacing:-1px;text-align:center;}
.sub-title{font-size:clamp(11px,3vw,15px);color:var(--text2);margin-top:6px;font-weight:700;letter-spacing:2px;text-align:center;}
.title-tubes{display:flex;gap:10px;justify-content:center;}
.title-tube-preview{width:26px;height:76px;background:var(--tube-glass);border:2px solid var(--tube-border);border-radius:0 0 18px 18px;border-top:none;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.title-tube-preview .tb{height:17px;width:100%;}
.btn-primary{background:linear-gradient(135deg,#7b61ff,#ff6bdf);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;padding:13px 42px;cursor:pointer;box-shadow:0 4px 22px rgba(123,97,255,.4);transition:transform .1s;touch-action:manipulation;}
.btn-primary:active{transform:scale(0.95);}

/* STAGE SELECT */
#stageScreen{z-index:10;justify-content:flex-start;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}
.stage-header{width:100%;padding:13px 15px 9px;display:flex;align-items:center;gap:10px;background:rgba(15,12,41,.8);backdrop-filter:blur(8px);border-bottom:1px solid var(--btn-border);}
.stage-header h2{font-size:18px;font-weight:900;background:linear-gradient(90deg,#ff6bdf,#7b61ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;text-align:center;}
.btn-icon{background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:11px;color:var(--text);font-size:16px;width:37px;height:37px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;touch-action:manipulation;flex-shrink:0;}
.btn-icon:active{transform:scale(0.9);}
.stage-grid-wrap{width:100%;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 10px 20px;}
.stage-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:400px;margin:0 auto;}
.stage-cell{aspect-ratio:1;border-radius:12px;background:var(--btn-bg);border:1.5px solid var(--btn-border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;gap:1px;touch-action:manipulation;position:relative;}
.stage-cell:active{transform:scale(0.91);}
.stage-cell.cleared{border-color:var(--accent2);background:rgba(123,97,255,.12);}
.stage-cell.perfect{border-color:var(--gold);background:rgba(255,215,0,.09);}
.stage-num{font-size:13px;font-weight:800;}
.stage-stars{font-size:9px;}
.stage-diff{position:absolute;top:3px;right:4px;font-size:6px;color:var(--text2);font-weight:700;}
.stage-gimmick{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:9px;}
.diff-1{color:#6bcb77;}.diff-2{color:#74b9ff;}.diff-3{color:#fdcb6e;}.diff-4{color:#ff7675;}.diff-5{color:#e17055;}

/* GAME */
#gameScreen{z-index:10;justify-content:flex-start;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}
.game-header{width:100%;padding:10px 13px 8px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,12,41,.82);backdrop-filter:blur(8px);border-bottom:1px solid var(--btn-border);flex-shrink:0;}
.game-label{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:1px;}
.game-val{font-size:18px;font-weight:900;color:var(--text);line-height:1;}
.game-val.accent{color:var(--accent);}
.game-area{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 5px 5px;overflow:hidden;}
.tubes-container{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:flex-end;width:100%;}

/* TUBE BASE */
.tube-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;touch-action:manipulation;position:relative;}
.tube-cap{height:9px;background:linear-gradient(180deg,rgba(200,230,255,.5) 0%,rgba(150,190,240,.25) 100%);border:1.5px solid var(--tube-border);border-bottom:none;border-radius:4px 4px 0 0;transform:scaleY(0);transform-origin:bottom;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;z-index:2;}
.tube-cap.capped{transform:scaleY(1);opacity:1;}
.tube-body{background:var(--tube-glass);border:2px solid var(--tube-border);border-top:none;position:relative;overflow:visible;transition:border-color .2s,box-shadow .2s;}
.tube-body::before{content:'';position:absolute;top:0;bottom:0;left:18%;width:5px;border-radius:3px;background:var(--tube-shine);pointer-events:none;z-index:1;}
.tube-body.selected{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.42),0 0 18px rgba(255,255,255,.16);}
.tube-body.can-recv{border-color:#6bcb77;box-shadow:0 0 0 2px rgba(107,203,119,.42),0 0 14px rgba(107,203,119,.18);}
.tube-body.no-recv{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.tube-inner{position:absolute;inset:0;overflow:hidden;border-radius:inherit;}
.tube-balls{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column-reverse;}
.ball{width:100%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.ball-inner{border-radius:50%;position:relative;box-shadow:inset -3px -3px 8px rgba(0,0,0,.28),inset 2px 2px 6px rgba(255,255,255,.36);}
.ball-inner::after{content:'';position:absolute;top:18%;left:20%;width:30%;height:20%;background:rgba(255,255,255,.5);border-radius:50%;filter:blur(2px);}

/* ===== GIMMICK: CURTAIN ===== */
.tube-curtain{position:absolute;inset:0;z-index:10;background:linear-gradient(160deg,#6c3483 0%,#4a235a 40%,#7d3c98 100%);border-radius:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;overflow:hidden;}
.tube-curtain::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,0.04) 0px,rgba(255,255,255,0.04) 3px,transparent 3px,transparent 10px);}
.tube-curtain::after{content:'';position:absolute;top:0;left:10%;width:80%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.07) 50%,transparent 100%);}
.curtain-icon{font-size:22px;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
.curtain-label{font-size:9px;font-weight:800;color:rgba(255,255,255,.7);letter-spacing:1px;z-index:1;}
.tube-curtain.dropping{animation:curtainDrop .6s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes curtainDrop{0%{transform:translateY(0);opacity:1;}60%{transform:translateY(110%);opacity:1;}100%{transform:translateY(110%);opacity:0;pointer-events:none;}}

/* ===== GIMMICK: LOCK ===== */
.tube-lock-overlay{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.lock-bar{width:100%;height:28px;background:linear-gradient(180deg,rgba(180,120,20,.85),rgba(140,90,10,.85));border:1.5px solid rgba(255,215,0,.4);display:flex;align-items:center;justify-content:center;gap:4px;position:relative;}
.lock-bar::after{content:'';position:absolute;left:10%;right:10%;bottom:0;height:1px;background:rgba(255,215,0,.25);}
.lock-icon{font-size:14px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}
.lock-color-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);flex-shrink:0;box-shadow:0 0 4px currentColor;}
.lock-bar.unlocking{animation:lockPop .5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes lockPop{0%{transform:translateY(0) scale(1);opacity:1;}30%{transform:translateY(-8px) scale(1.1);opacity:1;}100%{transform:translateY(-40px) scale(0.5);opacity:0;}}

/* ===== GIMMICK: MAGNET ===== */
/* 試験管の底に磁石バーを表示。反発色のボールは入れられない */
.tube-magnet-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:8;
  height:20px;
  background:linear-gradient(180deg,rgba(200,30,30,0.0) 0%,rgba(200,30,30,0.85) 40%,rgba(160,10,10,0.95) 100%);
  display:flex;align-items:center;justify-content:center;gap:4px;
  border-top:1.5px solid rgba(255,100,100,.5);
  pointer-events:none;
}
/* 磁石のU字形をCSSで表現 */
.magnet-icon{
  font-size:12px;
  filter:drop-shadow(0 0 4px rgba(255,80,80,0.8));
  z-index:1;
}
.magnet-repel-dot{
  width:10px;height:10px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.6);
  flex-shrink:0;
  box-shadow:0 0 5px currentColor, 0 0 10px currentColor;
  z-index:1;
}
/* 反発エフェクト：弾かれるボールのアニメーション */
@keyframes repelBounce{
  0%{transform:translateY(0) scale(1);}
  30%{transform:translateY(-14px) scale(1.1);}
  55%{transform:translateY(-6px) scale(0.95);}
  75%{transform:translateY(-10px) scale(1.05);}
  100%{transform:translateY(0) scale(1);}
}
.repel-flash{animation:repelBounce .45s cubic-bezier(.36,.07,.19,.97);}
/* 反発エフェクト：磁石の光る演出 */
@keyframes magnetPulse{
  0%,100%{box-shadow:0 0 6px 2px rgba(255,60,60,.4);}
  50%{box-shadow:0 0 18px 6px rgba(255,60,60,.85);}
}
.tube-body.magnet-active .tube-magnet-bar{animation:magnetPulse .4s ease;}

/* FOOTER */
.game-footer{width:100%;padding:8px 9px;display:flex;align-items:center;justify-content:center;gap:7px;background:rgba(15,12,41,.82);backdrop-filter:blur(8px);border-top:1px solid var(--btn-border);flex-shrink:0;flex-wrap:wrap;}
.btn-game{background:var(--btn-bg);border:1.5px solid var(--btn-border);border-radius:17px;color:var(--text);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:transform .1s;touch-action:manipulation;white-space:nowrap;}
.btn-game:active{transform:scale(0.92);}
.btn-game:disabled{opacity:0.38;cursor:default;}
.btn-add{border-color:rgba(107,203,119,.4);background:rgba(107,203,119,.07);}
.hint-badge{font-size:8px;color:var(--text2);background:rgba(255,215,0,.14);border-radius:6px;padding:1px 3px;}

/* LEGEND BAR */
.legend-bar{width:100%;padding:4px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;background:rgba(15,12,41,.5);border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2);font-weight:700;}

/* CLEAR */
#clearScreen{z-index:20;}
.clear-box{text-align:center;padding:26px 20px;background:rgba(15,12,41,.9);backdrop-filter:blur(14px);border-radius:24px;border:1.5px solid var(--btn-border);max-width:310px;width:90%;animation:clearPop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes clearPop{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
.c-emoji{font-size:50px;display:block;animation:bounce .7s ease .25s both;}
@keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.18)}80%{transform:scale(.95)}100%{transform:scale(1)}}
.c-msg{font-size:clamp(19px,5.5vw,27px);font-weight:900;margin:9px 0 3px;background:linear-gradient(135deg,#ffd700,#ff6bdf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.c-sub{font-size:14px;color:var(--text2);font-weight:700;margin-bottom:12px;}
.c-stats{display:flex;gap:16px;justify-content:center;margin-bottom:14px;}
.c-stat-num{font-size:21px;font-weight:900;color:var(--accent);}
.c-stat-lbl{font-size:9px;color:var(--text2);font-weight:700;}
.c-stars{font-size:24px;margin-bottom:14px;letter-spacing:3px;}
.c-btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
.btn-cnext{background:linear-gradient(135deg,#7b61ff,#ff6bdf);border:none;border-radius:17px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:10px 18px;cursor:pointer;touch-action:manipulation;transition:transform .1s;}
.btn-cnext:active{transform:scale(0.93);}
.btn-csel{background:var(--btn-bg);border:1.5px solid var(--btn-border);border-radius:17px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:10px 16px;cursor:pointer;touch-action:manipulation;transition:transform .1s;}
.btn-csel:active{transform:scale(0.93);}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(26,21,96,.96);border:1.5px solid var(--btn-border);border-radius:17px;padding:8px 16px;color:var(--text);font-weight:700;font-size:12px;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:19;}
.flying-ball{position:fixed;z-index:9999;border-radius:50%;pointer-events:none;box-shadow:inset -3px -3px 8px rgba(0,0,0,.28),inset 2px 2px 6px rgba(255,255,255,.36);}
.flying-ball::after{content:'';position:absolute;top:18%;left:20%;width:30%;height:20%;background:rgba(255,255,255,.5);border-radius:50%;filter:blur(2px);}
.fly-badge{position:absolute;right:-4px;top:-4px;background:#fff;color:#333;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<canvas id="confettiCanvas"></canvas>

<!-- TITLE -->
<div class="screen" id="titleScreen">
  <div><div class="main-title">ちゃぷりそーと3</div><div class="sub-title">🧪 COLOR SORT PUZZLE 🧪</div></div>
  <div class="title-tubes" id="titleTubes"></div>
  <button class="btn-primary" id="btnStart">ステージをえらぶ ▶</button>
</div>

<!-- STAGE SELECT -->
<div class="screen hidden" id="stageScreen">
  <div class="stage-header">
    <button class="btn-icon" id="btnBackToTitle">←</button>
    <h2>ちゃぷりそーと3</h2>
    <div style="width:37px"></div>
  </div>
  <div class="stage-grid-wrap">
    <div style="max-width:400px;margin:0 auto;padding:8px 0 4px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:10px;color:var(--text2);font-weight:700;padding:0 4px 8px;">
        <span>🟣カーテン</span><span>🔒ロック</span><span>🧲磁石</span>
      </div>
    </div>
    <div class="stage-grid" id="stageGrid"></div>
  </div>
</div>

<!-- GAME -->
<div class="screen hidden" id="gameScreen">
  <div class="game-header">
    <div><div class="game-label">STAGE</div><div class="game-val" id="hStage">1</div></div>
    <div style="text-align:center"><div class="game-label">てかず</div><div class="game-val accent" id="hMoves">0</div></div>
    <div style="display:flex;gap:5px">
      <button class="btn-icon" id="btnReset">🔄</button>
      <button class="btn-icon" id="btnGoSelect">☰</button>
    </div>
  </div>
  <div class="game-area"><div class="tubes-container" id="tubesCont"></div></div>
  <div class="legend-bar" id="legendBar"></div>
  <div class="game-footer">
    <button class="btn-game" id="btnUndo">↩ もどす</button>
    <button class="btn-game" id="hintBtn">💡 ヒント <span class="hint-badge" id="hintBadge">3</span></button>
    <button class="btn-game btn-add" id="addBtn">🧪＋ <span id="addBadge">(0/3)</span></button>
  </div>
</div>

<!-- CLEAR -->
<div class="screen hidden" id="clearScreen">
  <div class="clear-box">
    <span class="c-emoji" id="cEmoji">🎉</span>
    <div class="c-msg" id="cMsg">ちゃぷりすごい！</div>
    <div class="c-sub" id="cSub">Stage 1 クリア！</div>
    <div class="c-stars" id="cStars">⭐⭐⭐</div>
    <div class="c-stats">
      <div class="c-stat"><div class="c-stat-num" id="cMoves">0</div><div class="c-stat-lbl">てかず</div></div>
      <div class="c-stat"><div class="c-stat-num" id="cHints">0</div><div class="c-stat-lbl">ヒント</div></div>
    </div>
    <div class="c-btns">
      <button class="btn-cnext" id="btnNext">つぎへ ▶</button>
      <button class="btn-csel" id="btnClearSelect">ステージ選択</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- カスタム確認モーダル -->
<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;">
  <div style="background:rgba(15,12,41,.96);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:24px 22px;max-width:280px;width:88%;text-align:center;font-family:'Nunito',sans-serif;">
    <div id="modalMsg" style="font-size:15px;font-weight:700;color:#f0f4ff;margin-bottom:18px;line-height:1.5;"></div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button id="modalOk" style="background:linear-gradient(135deg,#7b61ff,#ff6bdf);border:none;border-radius:14px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:9px 22px;cursor:pointer;">はい</button>
      <button id="modalCancel" style="background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;color:#f0f4ff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:9px 18px;cursor:pointer;">キャンセル</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   COLORS (9 colors)
   ============================================================ */
const COLORS=[
  null,
  {h:'#FF6B6B'},{h:'#4ECDC4'},{h:'#FFE66D'},
  {h:'#A29BFE'},{h:'#6BCB77'},{h:'#FF9F43'},
  {h:'#FD79A8'},{h:'#74B9FF'},{h:'#E17055'}
];

/* ============================================================
   GIMMICK TYPES
   ============================================================ */
const GIMMICK={NONE:0,CURTAIN:1,LOCK:2,MAGNET:3};

/* ============================================================
   RNG (seeded Mulberry32)
   ============================================================ */
function mulberry32(seed){
  let a=seed|0;
  return ()=>{
    a=(a+0x6D2B79F5)|0;
    let t=Math.imul(a^(a>>>15),1|a);
    t=t+Math.imul(t^(t>>>7),61|t)^t;
    return((t^(t>>>14))>>>0)/4294967296;
  };
}

/* ============================================================
   STAGE CONFIG
   ============================================================ */
function stageConfig(s){
  if(s<=10) return{c:3+(s>5?1:0),t:5+(s>5?1:0),e:2,g:GIMMICK.NONE};
  if(s<=20) return{c:5,t:7,e:2,g:GIMMICK.NONE};
  if(s<=29) return{c:6,t:8,e:2,g:GIMMICK.NONE};
  // CURTAIN  30-49
  if(s<=39) return{c:4,t:6,e:2,g:GIMMICK.CURTAIN,gc:1};
  if(s<=49) return{c:5,t:8,e:3,g:GIMMICK.CURTAIN,gc:2};
  // LOCK  50-69
  if(s<=59) return{c:4,t:6,e:2,g:GIMMICK.LOCK,gc:1};
  if(s<=69) return{c:5,t:8,e:3,g:GIMMICK.LOCK,gc:2};
  // MAGNET  70-84
  if(s<=77) return{c:5,t:7,e:2,g:GIMMICK.MAGNET,gc:1};
  if(s<=84) return{c:6,t:9,e:3,g:GIMMICK.MAGNET,gc:2};
  // MIX  85-100
  return{c:6,t:9,e:3,g:'MIX',gc:3};
}

/* ============================================================
   STAGE GENERATOR
   安全保証：
   - CURTAIN/LOCK のトリガー色はギミック管の外に4個確保
   - MAGNET の反発色はギミック管自身の中に含まれる色から選ぶ
     （その管を完成させること自体は阻害しない = 外から入れられないだけ）
   ============================================================ */
function generateStage(s){
  const cfg=stageConfig(s);
  const rng=mulberry32(s*2654435769+54321);
  const isMix=cfg.g==='MIX';
  const colorCount=cfg.c,emptyCount=cfg.e,totalTubes=cfg.t,filledCount=totalTubes-emptyCount;

  // ボールプール生成・シャッフル
  let pool=[];
  for(let ci=1;ci<=colorCount;ci++) for(let b=0;b<4;b++) pool.push(ci);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const tubes=[];
  for(let i=0;i<filledCount;i++) tubes.push(pool.slice(i*4,i*4+4));
  for(let i=0;i<emptyCount;i++) tubes.push([]);
  const gimmickData=[];
  for(let i=0;i<totalTubes;i++) gimmickData.push({type:GIMMICK.NONE});

  const gimmickCount=cfg.gc||0;
  if(gimmickCount===0) return{tubes,gimmickData};

  // ギミックタイプリスト
  let gimmickTypes=[];
  if(!isMix&&cfg.g!==GIMMICK.NONE){
    for(let gi=0;gi<gimmickCount;gi++) gimmickTypes.push(cfg.g);
  } else if(isMix){
    gimmickTypes=[GIMMICK.CURTAIN,GIMMICK.LOCK,GIMMICK.MAGNET];
  }

  const clTypes=gimmickTypes.filter(g=>g===GIMMICK.CURTAIN||g===GIMMICK.LOCK);
  const mgTypes=gimmickTypes.filter(g=>g===GIMMICK.MAGNET);
  const clCount=clTypes.length;

  // filled管シャッフル
  const allFilled=[];
  for(let i=0;i<filledCount;i++) allFilled.push(i);
  for(let i=allFilled.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[allFilled[i],allFilled[j]]=[allFilled[j],allFilled[i]];}

  function combinations(arr,k){
    if(k===0)return[[]];if(arr.length<k)return[];
    const[first,...rest]=arr;
    return[...combinations(rest,k-1).map(c=>[first,...c]),...combinations(rest,k)];
  }

  // --- CURTAIN / LOCK 管選定 ---
  // 「選んだ管の色の和集合に含まれない色」が clCount 個以上になる組み合わせを選ぶ
  function countSafeColors(idxList){
    const lc=new Set();
    idxList.forEach(ti=>tubes[ti].forEach(c=>lc.add(c)));
    let n=0;
    for(let ci=1;ci<=colorCount;ci++) if(!lc.has(ci)) n++;
    return n;
  }

  let clGimmickTubes=[];
  if(clCount>0){
    const combos=combinations(allFilled.slice(0,Math.min(allFilled.length,9)),clCount);
    let bestSafe=-1;
    for(const combo of combos){
      const safe=countSafeColors(combo);
      if(safe>bestSafe){bestSafe=safe;clGimmickTubes=combo;}
    }
  }

  // トリガー色割り当て（ギミック管内にない色から重複なし）
  if(clGimmickTubes.length>0){
    const lockedColors=new Set();
    clGimmickTubes.forEach(ti=>tubes[ti].forEach(c=>lockedColors.add(c)));
    const safeColors=[];
    for(let ci=1;ci<=colorCount;ci++) if(!lockedColors.has(ci)) safeColors.push(ci);
    for(let i=safeColors.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[safeColors[i],safeColors[j]]=[safeColors[j],safeColors[i]];}
    clGimmickTubes.forEach((ti,gi)=>{
      gimmickData[ti]={type:clTypes[gi],locked:true,triggerColor:safeColors[gi%safeColors.length]};
    });
  }

  // --- MAGNET 管選定 ---
  // CURTAIN/LOCKで使っていない管から選ぶ
  const usedSet=new Set(clGimmickTubes);
  const mgCandidates=allFilled.filter(ti=>!usedSet.has(ti));

  mgTypes.forEach((gt,ci)=>{
    if(ci>=mgCandidates.length) return;
    const ti=mgCandidates[ci];
    if(!tubes[ti]||tubes[ti].length===0) return;

    // 反発色の選び方：
    //   この管を「完成させること」は妨げない = 管内に4個あるメイン色は反発色にしない
    //   管内の色の中で「個数が少なく、かつ外から入れることが多い色」を反発色にすると難しくなる
    //   → 管内の色セットを除外した色（= 管に関係ない色）から選ぶと「外からの補充を制限」する
    //   → しかしそれだと実質的にあまり制約にならない場合がある
    //   → 最も難しい選択：管の中の色の中から「個数が1〜2個（少量）のもの」を反発色にする
    //     （他の管にいるその色を、ここに入れられなくなる）
    const tubeColors=new Set(tubes[ti]);
    const colorCount2=tubes[ti].length;

    // 管内の各色の個数
    const colorFreq={};
    tubes[ti].forEach(c=>{colorFreq[c]=(colorFreq[c]||0)+1;});

    // 反発色候補：管の中に含まれるが個数が少ない色（他の管からここに「入れたい」色を遮断する）
    // かつ、その色がこの管以外に2個以上ある（遮断する意味がある）
    const repelCandidates=[];
    for(const [colorStr,freq] of Object.entries(colorFreq)){
      const color=Number(colorStr);
      let outsideCount=0;
      tubes.forEach((t,oi)=>{if(oi!==ti)t.forEach(c=>{if(c===color)outsideCount++;});});
      // 管内に1〜3個 & 外に1個以上ある → 反発色として有効
      if(freq>=1&&freq<=3&&outsideCount>=1){
        repelCandidates.push({color,freq,outsideCount});
      }
    }

    let repelColor;
    if(repelCandidates.length>0){
      // 管内個数が最少 & 外に多いものを優先（最も制約が強い）
      repelCandidates.sort((a,b)=>a.freq-b.freq||b.outsideCount-a.outsideCount);
      // 上位候補からランダムに選ぶ（決定論的に）
      const topCands=repelCandidates.filter(c=>c.freq===repelCandidates[0].freq);
      repelColor=topCands[Math.floor(rng()*topCands.length)].color;
    } else {
      // フォールバック：管内の任意の色
      const cols=[...tubeColors];
      repelColor=cols[Math.floor(rng()*cols.length)];
    }

    gimmickData[ti]={type:GIMMICK.MAGNET,repelColor};
  });

  return{tubes,gimmickData};
}

/* ============================================================
   TUBE SIZING
   ============================================================ */
let TW=50,BH=40;
function calcSize(n){
  const vw=Math.min(window.innerWidth,600);
  const vh=window.innerHeight;
  const rows=n<=5?1:n<=10?2:3;
  const cols=Math.ceil(n/rows);
  const areaH=vh-54-50-32-20;
  TW=Math.max(34,Math.min(58,Math.floor((vw-10-(cols-1)*7)/cols)));
  BH=Math.max(26,Math.min(46,Math.floor((areaH-rows*24)/rows/4)));
}

}

const prevComplete=new Set();

  stopConfetti();prevComplete.clear();

/* ============================================================
   GIMMICK HELPERS
   ============================================================ */
function isTubeLocked(idx){
  const gd=G.gimmickData[idx];
  if(!gd)return false;
  return(gd.type===GIMMICK.CURTAIN||gd.type===GIMMICK.LOCK)&&gd.locked;
}

// 磁石管に指定色のボールを入れられるか
function isMagnetRepelling(toIdx,colorId){
  const gd=G.gimmickData[toIdx];
  if(!gd||gd.type!==GIMMICK.MAGNET)return false;
  return gd.repelColor===colorId;
}

/* ============================================================
   COMPLETE COLOR CHECK + GIMMICK UNLOCK
   ============================================================ */
function checkAndUnlockGimmicks(){
  const newlyCompleted=[];
  G.tubes.forEach((tube)=>{
    if(tubeComplete(tube)){
      const col=tube[0];
      if(!G.completedColors.has(col)){G.completedColors.add(col);newlyCompleted.push(col);}
    }
  });
  newlyCompleted.forEach(col=>{
    G.gimmickData.forEach((gd,ti)=>{
      if(gd.type===GIMMICK.CURTAIN&&gd.locked&&gd.triggerColor===col) unlockCurtain(ti);
      else if(gd.type===GIMMICK.LOCK&&gd.locked&&gd.triggerColor===col) unlockLock(ti);
    });
  });
  // MAGNETは解除なし（永続的な制約）
}

function unlockCurtain(ti){
  G.gimmickData[ti].locked=false;
  const wrap=getTubeWrap(ti);if(!wrap)return;
  const curtain=wrap.querySelector('.tube-curtain');
  if(curtain){
    curtain.classList.add('dropping');
    playSound('unlock');showToast('🟣 カーテンが落ちた！');
    setTimeout(()=>{curtain.remove();renderTubes();},650);
  }
}
function unlockLock(ti){
  G.gimmickData[ti].locked=false;
  const wrap=getTubeWrap(ti);if(!wrap)return;
  const lockBar=wrap.querySelector('.lock-bar');
  if(lockBar){
    lockBar.classList.add('unlocking');
    playSound('unlock');showToast('🔒 ロックが解除された！');
    setTimeout(()=>{lockBar.remove();renderTubes();},600);
  }
}

/* ============================================================
   RENDER TUBES
   ============================================================ */
function renderTubes(){
  calcSize(G.tubes.length);
  const cont=document.getElementById('tubesCont');
  cont.innerHTML='';

  G.tubes.forEach((tube,idx)=>{
    const gd=G.gimmickData[idx]||{type:GIMMICK.NONE};
    const wrap=document.createElement('div');
    wrap.className='tube-wrap';
    wrap.dataset.idx=idx;
    wrap.addEventListener('click',(()=>{const i=idx;return()=>onTap(i);})());

    const isComplete=tubeComplete(tube);
    const completedKey=idx+':'+tube.join(',');
    if(isComplete&&!prevComplete.has(completedKey)){
      prevComplete.add(completedKey);
      setTimeout(()=>playSound('complete'),60);
    }

    // 蓋
    const cap=document.createElement('div');
    cap.className='tube-cap';
    cap.style.width=TW+'px';
    if(isComplete)cap.classList.add('capped');

    // ボディ
    const body=document.createElement('div');
    body.className='tube-body';
    body.style.width=TW+'px';
    body.style.height=(BH*4+8)+'px';
    body.style.borderRadius=`0 0 ${TW/2}px ${TW/2}px`;
    if(G.sel===idx)body.classList.add('selected');

    // ボールを入れる内側レイヤー（overflow:hidden）
    const inner=document.createElement('div');
    inner.className='tube-inner';

    const ballsDiv=document.createElement('div');
    ballsDiv.className='tube-balls';

    const isCurtained=gd.type===GIMMICK.CURTAIN&&gd.locked;
    if(!isCurtained){
      tube.forEach(ci=>ballsDiv.appendChild(makeBall(ci)));
    }
    inner.appendChild(ballsDiv);
    body.appendChild(inner);

    // ── CURTAIN オーバーレイ ──
    if(gd.type===GIMMICK.CURTAIN&&gd.locked){
      const curtain=document.createElement('div');curtain.className='tube-curtain';
      const trigDot=document.createElement('div');
      trigDot.style.cssText=`width:14px;height:14px;border-radius:50%;background:${COLORS[gd.triggerColor].h};border:2px solid rgba(255,255,255,.5);z-index:1;box-shadow:0 0 6px ${COLORS[gd.triggerColor].h};`;
      const icon=document.createElement('div');icon.className='curtain-icon';icon.textContent='🎭';
      const lbl=document.createElement('div');lbl.className='curtain-label';lbl.textContent='この色が完成したら';
      curtain.appendChild(icon);curtain.appendChild(trigDot);curtain.appendChild(lbl);
      body.appendChild(curtain);
    }

    // ── LOCK オーバーレイ ──
    if(gd.type===GIMMICK.LOCK&&gd.locked){
      const ov=document.createElement('div');ov.className='tube-lock-overlay';
      const bar=document.createElement('div');bar.className='lock-bar';
      const lockIco=document.createElement('span');lockIco.className='lock-icon';lockIco.textContent='🔒';
      const dot=document.createElement('div');dot.className='lock-color-dot';
      dot.style.background=COLORS[gd.triggerColor].h;
      dot.style.color=COLORS[gd.triggerColor].h;
      bar.appendChild(lockIco);bar.appendChild(dot);
      ov.appendChild(bar);body.appendChild(ov);
    }

    // ── MAGNET バー（底部に表示）──
    if(gd.type===GIMMICK.MAGNET){
      const mbar=document.createElement('div');mbar.className='tube-magnet-bar';
      const mico=document.createElement('span');mico.className='magnet-icon';mico.textContent='🧲';
      const mdot=document.createElement('div');mdot.className='magnet-repel-dot';
      mdot.style.background=COLORS[gd.repelColor].h;
      mdot.style.color=COLORS[gd.repelColor].h;
      mbar.appendChild(mico);mbar.appendChild(mdot);
      // マグネットバーはbody直下（overflow:visibleのため外に出ない）
      inner.appendChild(mbar);
    }

    wrap.appendChild(cap);
    wrap.appendChild(body);
    cont.appendChild(wrap);
  });
}

function makeBall(ci){
  const b=document.createElement('div');
  b.className='ball';
  b.style.height=BH+'px';
  const bsize=TW-10;
  const inn=document.createElement('div');
  inn.className='ball-inner';
  inn.style.width=bsize+'px';
  inn.style.height=bsize+'px';
  inn.style.background=`radial-gradient(circle at 35% 35%,${lighten(COLORS[ci].h,28)},${COLORS[ci].h})`;
  b.appendChild(inn);
  return b;
}

function tubeComplete(tube){return tube.length===4&&tube.every(c=>c===tube[0]);}
function lighten(hex,p){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),bv=parseInt(hex.slice(5,7),16),f=p/100;
  return`rgb(${Math.min(255,r+f*(255-r)|0)},${Math.min(255,g+f*(255-g)|0)},${Math.min(255,bv+f*(255-bv)|0)})`;
}
function getTubeWrap(idx){return document.querySelector(`.tube-wrap[data-idx="${idx}"]`);}

/* ============================================================
   TAP LOGIC
   ============================================================ */
function onTap(idx){
  if(G.anim)return;

  if(isTubeLocked(idx)){
    const gd=G.gimmickData[idx];
    if(gd.type===GIMMICK.CURTAIN) showToast('🎭 指定色を完成させるとカーテンが開きます');
    else if(gd.type===GIMMICK.LOCK) showToast('🔒 ドットの色を完成させると解錠します');
    playSound('error');return;
  }

  if(G.sel===null){
    if(G.tubes[idx].length===0)return;
    if(tubeComplete(G.tubes[idx])){showToast('もう完成しています！');return;}
    G.sel=idx;renderTubes();return;
  }

  if(G.sel===idx){G.sel=null;renderTubes();return;}

  const from=G.sel,to=idx;G.sel=null;
  if(canMove(from,to)){
    doMove(from,to);
  } else {
    // 磁石反発の場合は専用エフェクト
    const topColor=G.tubes[from].length?G.tubes[from][G.tubes[from].length-1]:0;
    if(isMagnetRepelling(to,topColor)){
      renderTubes();
      triggerMagnetRepelEffect(to);
    } else {
      renderTubes();
      const body=document.querySelector(`.tube-wrap[data-idx="${to}"] .tube-body`);
      if(body){body.classList.add('no-recv');setTimeout(()=>body.classList.remove('no-recv'),400);}
      playSound('error');
    }
  }
}

function triggerMagnetRepelEffect(toIdx){
  const wrap=getTubeWrap(toIdx);
  if(!wrap)return;
  const body=wrap.querySelector('.tube-body');
  // 磁石バーをパルス
  if(body){
    body.classList.add('magnet-active');
    setTimeout(()=>body.classList.remove('magnet-active'),450);
  }
  playSound('magnet');
  showToast('🧲 磁石が反発した！その色は入れられません');
}

function canMove(from,to){
  const src=G.tubes[from],dst=G.tubes[to];
  if(src.length===0||dst.length>=4)return false;
  if(tubeComplete(src))return false;
  if(isTubeLocked(to))return false;
  const top=src[src.length-1];
  // 磁石チェック：反発色は入れられない
  if(isMagnetRepelling(to,top))return false;
  return dst.length===0||dst[dst.length-1]===top;
}

/* ============================================================
   DO MOVE + ANIMATION
   ============================================================ */
function countTopSame(from){
  const src=G.tubes[from];
  if(!src.length)return 0;
  const topColor=src[src.length-1];
  let n=0;
  for(let i=src.length-1;i>=0&&src[i]===topColor;i--) n++;
  return n;
}

function doMove(from,to){
  const available=4-G.tubes[to].length;
  const topCount=countTopSame(from);
  const n=Math.min(topCount,available);
  if(n===0)return;

  G.hist.push({
    tubes:G.tubes.map(t=>[...t]),
    gimmickData:JSON.parse(JSON.stringify(G.gimmickData)),
    completedColors:[...G.completedColors],
  });

  G.anim=true;
  const fromWrap=getTubeWrap(from),toWrap=getTubeWrap(to);
  if(!fromWrap||!toWrap){applyMoveData(from,to,n);G.anim=false;afterMove();return;}

  const fr=fromWrap.querySelector('.tube-body').getBoundingClientRect();
  const tr=toWrap.querySelector('.tube-body').getBoundingClientRect();
  const ci=G.tubes[from][G.tubes[from].length-1];
  const color=COLORS[ci].h;
  const size=TW-10;
  const sx=fr.left+fr.width/2-size/2,sy=fr.top+6;
  const ex=tr.left+tr.width/2-size/2,ey=tr.bottom-(G.tubes[to].length+n)*BH-4;
  const mx=(sx+ex)/2,my=Math.min(sy,ey)-52;

  const fly=document.createElement('div');
  fly.className='flying-ball';
  fly.style.cssText=`width:${size}px;height:${size}px;left:${sx}px;top:${sy}px;background:radial-gradient(circle at 35% 35%,${lighten(color,28)},${color});`;
  if(n>1){const bd=document.createElement('div');bd.className='fly-badge';bd.textContent=n;fly.appendChild(bd);}
  document.body.appendChild(fly);

  const dur=290,t0=performance.now();
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    const e=t<0.5?2*t*t:-1+(4-2*t)*t;
    fly.style.left=((1-e)*(1-e)*sx+2*(1-e)*e*mx+e*e*ex)+'px';
    fly.style.top=((1-e)*(1-e)*sy+2*(1-e)*e*my+e*e*ey)+'px';
    if(t<1){requestAnimationFrame(frame);}
    else{fly.remove();applyMoveData(from,to,n);playSound('drop');G.moves++;G.anim=false;afterMove();}
  }
  requestAnimationFrame(frame);
}

function applyMoveData(from,to,n){
  const balls=G.tubes[from].splice(G.tubes[from].length-n,n);
  G.tubes[to].push(...balls);
  renderTubes();
}

function afterMove(){
  updateUI();
  checkAndUnlockGimmicks();
  const done=G.tubes.every((t,i)=>{
    if(isTubeLocked(i))return false;
    return t.length===0||tubeComplete(t);
  });
  if(done)setTimeout(()=>showClear(),380);
}

/* ============================================================
   UNDO
   ============================================================ */
function undoMove(){
  if(G.anim||G.hist.length===0)return;
  const snap=G.hist.pop();
  G.tubes=snap.tubes.map(t=>[...t]);
  G.gimmickData=JSON.parse(JSON.stringify(snap.gimmickData));
  G.completedColors=new Set(snap.completedColors);
  G.sel=null;G.moves=Math.max(0,G.moves-1);
  prevComplete.clear();
  G.tubes.forEach((tube,ti)=>{if(tubeComplete(tube))prevComplete.add(ti+':'+tube.join(','));});
  renderTubes();updateUI();playSound('undo');
}

/* ============================================================
   HINT
   ============================================================ */
function useHint(){
  if(G.hints>=3){showToast('ヒントはもうつかえません');return;}
  const h=findHint();
  if(!h){showToast('もうすこし　かんがえてみよう！');return;}
  G.hints++;updateUI();
  const fw=document.querySelector(`.tube-wrap[data-idx="${h.from}"] .tube-body`);
  const tw=document.querySelector(`.tube-wrap[data-idx="${h.to}"] .tube-body`);
  if(fw){fw.style.boxShadow='0 0 0 3px gold,0 0 18px gold';setTimeout(()=>fw&&(fw.style.boxShadow=''),1600);}
  if(tw){tw.style.boxShadow='0 0 0 3px #6bcb77,0 0 14px #6bcb77';setTimeout(()=>tw&&(tw.style.boxShadow=''),1600);}
}

function findHint(){
  for(let f=0;f<G.tubes.length;f++){
    if(!G.tubes[f].length||tubeComplete(G.tubes[f])||isTubeLocked(f))continue;
    for(let t=0;t<G.tubes.length;t++){
      if(f!==t&&canMove(f,t)&&G.tubes[t].length>0)return{from:f,to:t};
    }
  }
  for(let f=0;f<G.tubes.length;f++)
    for(let t=0;t<G.tubes.length;t++)
      if(f!==t&&canMove(f,t))return{from:f,to:t};
  return null;
}

/* ============================================================
   ADD TUBE
   ============================================================ */
function addTube(){
  if(G.added>=3)return;
  G.hist.push({tubes:G.tubes.map(t=>[...t]),gimmickData:JSON.parse(JSON.stringify(G.gimmickData)),completedColors:[...G.completedColors]});
  G.tubes.push([]);
  G.gimmickData.push({type:GIMMICK.NONE});
  G.added++;renderTubes();updateUI();
  showToast(`🧪 空の試験管を追加（${G.added}/3）`);
}

/* ============================================================
   UI UPDATE
   ============================================================ */
function updateUI(){
  document.getElementById('hMoves').textContent=G.moves;
  document.getElementById('hintBadge').textContent=3-G.hints;
  document.getElementById('hintBtn').disabled=G.hints>=3;
  document.getElementById('addBadge').textContent=`(${G.added}/3)`;
  document.getElementById('addBtn').disabled=G.added>=3;
}

/* ============================================================
   CLEAR
   ============================================================ */
function baseMoves(s){if(s<=10)return 14;if(s<=29)return 22;if(s<=49)return 30;if(s<=69)return 38;return 50;}
function showClear(){
  const s=G.stage,mv=G.moves,h=G.hints;
  let stars=h===0&&mv<=baseMoves(s)*1.3?3:h<=1?2:1;
  loadSD();
  if(stars>(SD.cl[s]||0))SD.cl[s]=stars;
  if(!SD.bm[s]||mv<SD.bm[s])SD.bm[s]=mv;
  saveSD();
  const cm=MSGS[Math.floor(Math.random()*MSGS.length)];
  document.getElementById('cEmoji').textContent=cm.e;
  document.getElementById('cMsg').textContent=cm.m;
  document.getElementById('cSub').textContent=`Stage ${s} クリア！`;
  document.getElementById('cMoves').textContent=mv;
  document.getElementById('cHints').textContent=h;
  document.getElementById('cStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  startConfetti();showScreen('clearScreen');
}
function nextStage(){stopConfetti();if(G.stage<100)startStage(G.stage+1);else showStageSelect();}

/* ============================================================
   SOUND
   ============================================================ */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playSound(type){
  try{
    const ctx=ac();const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='drop'){
      o.type='sine';o.frequency.setValueAtTime(500,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(260,ctx.currentTime+0.11);
      g.gain.setValueAtTime(0.26,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.16);
      o.start();o.stop(ctx.currentTime+0.16);
    }else if(type==='complete'){
      [523,659,784].forEach((f,i)=>{
        const oc=ctx.createOscillator(),gc=ctx.createGain();
        oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;
        gc.gain.setValueAtTime(0.2,ctx.currentTime+i*.1);gc.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.1+0.26);
        oc.start(ctx.currentTime+i*.1);oc.stop(ctx.currentTime+i*.1+0.26);
      });
    }else if(type==='error'){
      o.type='square';o.frequency.setValueAtTime(170,ctx.currentTime);
      g.gain.setValueAtTime(0.13,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
      o.start();o.stop(ctx.currentTime+0.1);
    }else if(type==='undo'){
      o.type='sine';o.frequency.setValueAtTime(380,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(260,ctx.currentTime+0.14);
      g.gain.setValueAtTime(0.17,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.17);
      o.start();o.stop(ctx.currentTime+0.17);
    }else if(type==='unlock'){
      [440,554,659,880].forEach((f,i)=>{
        const oc=ctx.createOscillator(),gc=ctx.createGain();
        oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;
        gc.gain.setValueAtTime(0.18,ctx.currentTime+i*.07);gc.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.07+0.22);
        oc.start(ctx.currentTime+i*.07);oc.stop(ctx.currentTime+i*.07+0.22);
      });
    }else if(type==='magnet'){
      // 反発音：ブーンとした低音+高音のヒット
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.connect(g2);g2.connect(ctx.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(80,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.2);
      g.gain.setValueAtTime(0.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
      o.start();o.stop(ctx.currentTime+0.22);
      o2.type='square';o2.frequency.setValueAtTime(320,ctx.currentTime);
      o2.frequency.exponentialRampToValueAtTime(160,ctx.currentTime+0.12);
      g2.gain.setValueAtTime(0.12,ctx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.14);
      o2.start();o2.stop(ctx.currentTime+0.14);
    }
  }catch(e){}
}

/* ============================================================
   CONFETTI
   ============================================================ */
let confId=null;const parts=[];
function startConfetti(){
  const cv=document.getElementById('confettiCanvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;parts.length=0;
  const cols=['#ff6bdf','#7b61ff','#ffd700','#6bcb77','#74b9ff','#ff6b6b','#ffe66d','#4ecdc4'];
  for(let i=0;i<130;i++)parts.push({x:Math.random()*cv.width,y:-10-Math.random()*120,vx:(Math.random()-.5)*4,vy:2+Math.random()*4,col:cols[Math.floor(Math.random()*cols.length)],w:5+Math.random()*8,h:7+Math.random()*10,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.2,al:1});
  animConf();
}
function animConf(){
  const cv=document.getElementById('confettiCanvas'),ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;if(p.y>cv.height*.65)p.al-=0.022;if(p.al>0)alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=Math.max(0,p.al);ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
  confId=alive?requestAnimationFrame(animConf):null;
  if(!alive)ctx.clearRect(0,0,cv.width,cv.height);
}
function stopConfetti(){if(confId){cancelAnimationFrame(confId);confId=null;}const cv=document.getElementById('confettiCanvas');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer=null;
function showToast(msg,ms=2200){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}

document.getElementById('addBtn').addEventListener('click',addTube);

['touchstart','click'].forEach(ev=>document.addEventListener(ev,()=>{try{ac().resume();}catch(e){}},{once:true}));
window.addEventListener('resize',()=>{if(!document.getElementById('gameScreen').classList.contains('hidden'))renderTubes();});
